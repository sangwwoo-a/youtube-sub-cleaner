<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devkorea1m — Android 앱을 만듭니다</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #FF4444; --red-light: #fff0f0;
      --blue: #3B82F6; --blue-light: #EFF6FF;
      --gray-100: #f7f7f7; --gray-200: #eeeeee;
      --gray-600: #666666; --gray-900: #111111;
      --white: #ffffff; --radius: 16px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; color: var(--gray-900); background: var(--gray-100); line-height: 1.7; }
    a { color: inherit; text-decoration: none; }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--gray-200);
      padding: 0 2rem; display: flex; align-items: center; height: 56px;
    }
    .nav-logo { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .nav-logo span { color: var(--blue); }
    .hero { text-align: center; padding: 72px 24px 48px; }
    .hero-badge {
      display: inline-block; background: var(--blue-light); color: var(--blue);
      font-size: 13px; font-weight: 600; padding: 4px 14px; border-radius: 99px; margin-bottom: 20px;
    }
    .hero h1 { font-size: clamp(26px, 5vw, 40px); font-weight: 800; letter-spacing: -1px; line-height: 1.25; margin-bottom: 14px; }
    .hero p { font-size: 16px; color: var(--gray-600); max-width: 400px; margin: 0 auto; }
    .cards-section { padding: 0 24px 80px; max-width: 860px; margin: 0 auto; }
    .cards-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
    @media (min-width: 640px) { .cards-grid { grid-template-columns: 1fr 1fr; } }
    .app-card {
      background: var(--white); border-radius: var(--radius);
      padding: 36px 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column; gap: 12px;
    }
    .app-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
    .card-icon { font-size: 40px; }
    .card-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .card-desc { font-size: 15px; color: var(--gray-600); flex: 1; line-height: 1.6; }
    .card-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 8px; padding: 10px 20px; border-radius: 99px;
      font-size: 14px; font-weight: 600; transition: opacity 0.2s; width: fit-content;
    }
    .card-btn:hover { opacity: 0.85; }
    .card-ysc { border-top: 4px solid var(--red); }
    .card-ysc .card-title { color: var(--red); }
    .card-ysc .card-btn { background: var(--red); color: var(--white); }
    .card-ww { border-top: 4px solid var(--blue); }
    .card-ww .card-title { color: var(--blue); }
    .card-ww .card-btn { background: var(--blue); color: var(--white); }
    footer {
      text-align: center; padding: 32px 24px;
      border-top: 1px solid var(--gray-200); background: var(--white);
      font-size: 14px; color: var(--gray-600);
    }
    footer a { color: var(--blue); }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav>
  <span class="nav-logo">Devkorea<span>1m</span></span>
</nav>

<section class="hero">
  <span class="hero-badge">Android 앱</span>
  <h1>Android 앱을 만듭니다</h1>
  <p>유용하고 심플한 앱으로 일상을 더 편리하게 만들어 드립니다.</p>
</section>

<section class="cards-section">
  <div class="cards-grid">

    <div class="app-card card-ysc">
      <div class="card-icon">🧹</div>
      <div class="card-title">Youtube Sub Cleaner</div>
      <div class="card-desc">
        유튜브 구독 채널을 한 번에 정리하세요.<br>
        오래된 채널, 더 이상 보지 않는 채널을<br>
        빠르고 간편하게 정리할 수 있습니다.
      </div>
      <a class="card-btn" href="/youtubesubcleaner/">자세히 보기 →</a>
    </div>

    <div class="app-card card-ww">
      <div class="card-icon">🌦️</div>
      <div class="card-title">WeatherWake</div>
      <div class="card-desc">
        날씨 연동 알람 앱.<br>
        비 오는 날 알람이 먼저 움직입니다.<br>
        출근 준비 시간을 자동으로 조정해드려요.
      </div>
      <a class="card-btn" href="/weatherwake/">자세히 보기 →</a>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Devkorea1m &nbsp;·&nbsp; <a href="mailto:sangwwoo84@gmail.com">sangwwoo84@gmail.com</a></p>
</footer>

</body>
</html>
